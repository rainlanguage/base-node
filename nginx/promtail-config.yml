server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: nginx_rpc
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx_rpc
          __path__: /var/log/nginx/rpc.log
    pipeline_stages:
      - json:
          expressions:
            uri: uri
            time: time
            status: status
            api_key: api_key
            remote_addr: remote_addr
            request_time: request_time
            upstream_time: upstream_time
            connection_type: connection_type
      - labels:
          status:
          api_key:
          connection_type:
