# Load API key map
map $arg_apikey $valid_key {
    include /etc/nginx/api_keys.map;
    default 0;    # deny by default
}

# RPC JSON Log Format
log_format rpc_json escape=json '
{
    "time": "$time_iso8601",
    "connection_type": "$connection_type",

    "remote_addr": "$remote_addr",
    "xff": "$proxy_add_x_forwarded_for",

    "method": "$request_method",
    "uri": "$request_uri",

    "status": $status,

    "request_time": $request_time,
    "upstream_time": "$upstream_response_time",

    "request_length": $request_length,
    "bytes_sent": $bytes_sent,

    "api_key": "$arg_apikey",
    "host": "$host"
}';

# RPC http Server
server {
    listen 18545;
    server_name _;

    access_log /var/log/nginx/rpc.log rpc_json;

    set $connection_type "http";

    # Optional hardening
    # client_max_body_size 5m;


    location / {
        # Require apikey query param
        if ($valid_key = 0) {
            return 403 '{"error":"forbidden","reason":"permission denied, invalid api key"}';
        }


        proxy_pass http://127.0.0.1:8545;

        # proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # important for accurate latency measurement
        proxy_buffering off;
        proxy_request_buffering off;
    }
}

# RPC ws Server
server {
    listen 18546;
    server_name _;

    access_log /var/log/nginx/rpc.log rpc_json;

    set $connection_type "ws";

    location / {
        # Require apikey query param
        if ($valid_key = 0) {
            return 403 '{"error":"forbidden","reason":"permission denied, invalid api key"}';
        }


        proxy_pass http://127.0.0.1:8546;
        proxy_http_version 1.1;   # REQUIRED for WebSocket

        # proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # If you ever use websockets on this port:
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # read/send timeouts
        # proxy_read_timeout 3600s;
        # proxy_send_timeout 3600s;
   
        # important for accurate latency measurement
        proxy_buffering off;
    } 
}

